name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # Note: bundled npm 10+ in node 22 already supports --provenance and
      # OIDC trusted publishing. Don't run `npm install -g npm@latest` —
      # the runner image's bundled npm has had broken dependencies
      # (missing promise-retry) that fail the upgrade step.
      - run: npm install
      - run: npm run build
      - run: npm publish --provenance --access public
